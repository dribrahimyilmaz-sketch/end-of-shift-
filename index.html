<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>End of Shift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0e17;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
canvas{display:block;touch-action:none;cursor:pointer}
#nameOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,8,25,0.97);flex-direction:column;align-items:center;justify-content:center;z-index:10;}
#nameOverlay h1{color:#e9c46a;font:bold 26px Arial;margin-bottom:10px;}
#nameOverlay p{color:rgba(255,255,255,0.5);font:14px Arial;margin-bottom:30px;}
#nameOverlay input{width:260px;padding:12px 16px;font-size:18px;border:2px solid #555;border-radius:10px;background:rgba(255,255,255,0.08);color:#fff;outline:none;text-align:center;margin-bottom:16px;}
#nameOverlay input:focus{border-color:#4ade80;}
.avatarPicker{display:flex;gap:10px;margin:-4px 0 18px;}
.avatarPicker button{width:58px;height:64px;border:1px solid rgba(255,255,255,0.18);border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.avatarPicker button.active{border-color:#4ade80;background:rgba(74,222,128,0.18);box-shadow:0 0 0 2px rgba(74,222,128,0.18);}
.avatarPicker canvas{width:44px;height:54px;display:block;}
#nameOverlay button.startBtn{width:180px;padding:13px;font:bold 16px Arial;border:none;border-radius:10px;background:#4ade80;color:#000;cursor:pointer;margin-bottom:12px;}

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nameOverlay">
  <h1>END OF SHIFT</h1>
  <p>Enter your name to start</p>
  <input id="nameField" type="text" maxlength="16" placeholder="Your name..." autocomplete="off"/>
  <div class="avatarPicker" id="avatarPicker" aria-label="Choose avatar">
    <button type="button" data-avatar="maleDoctor" onclick="selectAvatar('maleDoctor')" title="Male doctor"><canvas width="44" height="54" data-avatar-preview="maleDoctor"></canvas></button>
    <button type="button" data-avatar="femaleDoctor" onclick="selectAvatar('femaleDoctor')" title="Female doctor"><canvas width="44" height="54" data-avatar-preview="femaleDoctor"></canvas></button>
    <button type="button" data-avatar="maleNurse" onclick="selectAvatar('maleNurse')" title="Male nurse"><canvas width="44" height="54" data-avatar-preview="maleNurse"></canvas></button>
    <button type="button" data-avatar="femaleNurse" onclick="selectAvatar('femaleNurse')" title="Female nurse"><canvas width="44" height="54" data-avatar-preview="femaleNurse"></canvas></button>
  </div>
  <button class="startBtn" onclick="submitName()">▶ START</button>
  <button class="lbBtn" onclick="openLB()">🏆 Leaderboard</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w,h,gr;
function resize(){w=canvas.width=Math.min(window.innerWidth,800);h=canvas.height=Math.min(window.innerHeight,550);gr=Math.floor(h*0.65);}
resize();

// Audio
let AC;
function beep(f,t,d,v=0.2){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const SFX={grow:()=>beep(200,'sawtooth',0.04,0.07),fall:()=>beep(160,'sine',0.3),land:()=>beep(420,'sine',0.12),perfect:()=>{beep(660,'sine',0.1,0.3);setTimeout(()=>beep(880,'sine',0.15,0.3),80)},fail:()=>{beep(200,'sawtooth',0.15);setTimeout(()=>beep(110,'sawtooth',0.35),120)},score:()=>beep(520,'triangle',0.1),lvl:()=>{beep(523,'sine',0.12,0.3);setTimeout(()=>beep(659,'sine',0.12,0.3),120);setTimeout(()=>beep(784,'sine',0.2,0.3),240)}};

// Supabase
const SB_URL='https://vriammjvjuyyrevbsvwf.supabase.co';
const SB_KEY='sb_publishable_GSxI0zjTs9rYn_9LiEesPQ_ajbzbiak';
async function saveScore(name,score,level){if(name.trim().toLowerCase()==='pol25')return false;try{const r=await fetch(`${SB_URL}/rest/v1/scores`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Prefer':'return=minimal'},body:JSON.stringify({name:name.slice(0,16),score:Number(score)||0,level:Number(level)||1})});if(!r.ok)console.warn('Score save failed:',await r.text());return r.ok;}catch(e){console.warn('Score save error:',e);return false;}}
async function getLeaderboard(){try{const r=await fetch(`${SB_URL}/rest/v1/scores?select=name,score,level&order=score.desc&limit=10`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});if(!r.ok){console.warn('Leaderboard failed:',await r.text());return [];}const data=await r.json();return Array.isArray(data)?data.filter(row=>(row.name||'').trim().toLowerCase()!=='pol25'):[];}catch(e){console.warn('Leaderboard error:',e);return[];}}

// Persist
let hi=parseInt(localStorage.getItem('kd_hi')||'0');
function saveHi(){if(score>hi){hi=score;localStorage.setItem('kd_hi',hi);}}

// Player
let playerName='';
let selectedAvatar='maleDoctor';
let leaderboard=[];
let showLeaderboard=false;
let adminStartLevel=1;
let activePlayerCount=null;
const sessionId=localStorage.getItem('eos_session')||`${Date.now()}-${Math.random().toString(36).slice(2)}`;
localStorage.setItem('eos_session',sessionId);
function refreshLeaderboard(){getLeaderboard().then(data=>{leaderboard=data;});}
function isAdminName(name=playerName){return name.trim().toLowerCase()==='pol25';}
async function refreshActivePlayers(){if(!playerName||isAdminName())return;try{const now=Date.now(),nowIso=new Date(now).toISOString();await fetch(`${SB_URL}/rest/v1/active_players`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({session_id:sessionId,name:playerName.slice(0,16),last_seen:nowIso})});const cutoff=now-45000,since=new Date(cutoff).toISOString();const r=await fetch(`${SB_URL}/rest/v1/active_players?select=session_id,last_seen&last_seen=gt.${encodeURIComponent(since)}`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});if(r.ok){const data=await r.json();activePlayerCount=Array.isArray(data)?data.filter(row=>Date.parse(row.last_seen)>cutoff).length:null;}}catch(e){}}
setInterval(refreshActivePlayers,15000);

const nameOverlay=document.getElementById('nameOverlay');
const nameField=document.getElementById('nameField');
const avatarPicker=document.getElementById('avatarPicker');
function updateAvatarButtons(){avatarPicker.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.avatar===selectedAvatar));drawAvatarPreviews();}
function selectAvatar(avatar){selectedAvatar=avatar;localStorage.setItem('eos_avatar',selectedAvatar);updateAvatarButtons();}
function showNameOverlay(){nameOverlay.style.display='flex';setTimeout(()=>nameField.focus(),100);}
function hideNameOverlay(){nameOverlay.style.display='none';}
function submitName(){const n=nameField.value.trim();if(n.length<2)return;playerName=n;adminStartLevel=1;localStorage.setItem('eos_name',playerName);localStorage.setItem('eos_avatar',selectedAvatar);hideNameOverlay();refreshActivePlayers();startGame(adminStartLevel);}
function openLB(){hideNameOverlay();getLeaderboard().then(data=>{leaderboard=data;showLeaderboard=true;});}
function backToMenu(){scene=null;pressing=false;showNameOverlay();}
nameField.addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});

// Sky
const SKIES={dawn:['#1a0533','#6b2d6b','#f4845f','#ffd166'],morning:['#3a7bd5','#63b3ed','#bee3f8','#e8f4fd'],noon:['#1a6fc4','#2980b9','#5dade2','#aed6f1'],dusk:['#0d0221','#4a1942','#c0392b','#e67e22'],night:['#0d0b1e','#0d0b1e','#1a1a3e','#1a1a3e']};
const GND={dawn:['#2d1b4e','#1a0e2e'],morning:['#2d4a7a','#19283f'],noon:['#1e5ba8','#0d2d5e'],dusk:['#4a1942','#1a0a2e'],night:['#1a1a3e','#060408']};
const TLIST=['morning','noon','dusk','night','dawn'];
const WLIST=['clear','clear','cloudy','rainy','snowy'];
const DEATH_MSGS=["You left something\nin the ED. Go back!","You have a lecture.\nYou can't leave!","The attending is\ncalling you back...","Penalty shift\nhas been assigned!"];
function lc(a,b,t){const p=s=>parseInt(s,16);const[ar,ag,ab]=[a.slice(1,3),a.slice(3,5),a.slice(5,7)].map(p);const[br,bg,bb]=[b.slice(1,3),b.slice(3,5),b.slice(5,7)].map(p);return`rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;}

// State
let state,score,lives,camX,tCamX,stick,plats,ci,pl,floats,elapsed,gtimer,perf,lvl,lp,pc,skyA,skyB,skyT,clouds,rain,snow,gone,pressing,deathMsg,deathMsgT,scene,sceneT,introDocX,burstWX,burstY,burstT;

function diff(){return Math.min((lvl-1+lp/10)/8,1);}
function gspd(){return 240+diff()*120;}
function fspd(){return 180+diff()*120;}
function wspd(){return 180+diff()*220;}

function mkPlat(ax,last){
  const d=diff(),gap=65+d*70+Math.random()*(75-d*35);
  pc++;let wid;
  if(pc%(2+Math.floor(Math.random()*2))===0){const r=Math.random();if(r<0.25)wid=14+Math.random()*10;else if(r<0.55)wid=26+Math.random()*18;else if(r<0.8)wid=44+Math.random()*28;else wid=72+Math.random()*38;wid=Math.max(14,wid-d*28);}
  else{wid=Math.max(14,110-d*68+(Math.random()-0.3)*28);}
  return{x:ax+gap,w:wid,last:!!last};
}
function buildLvl(){const l=plats[plats.length-1];let x=l.x+l.w;for(let i=0;i<10;i++){plats.push(mkPlat(x,i===9));x=plats[plats.length-1].x+plats[plats.length-1].w;}}
function mkClouds(){clouds=Array.from({length:6},()=>({wx:Math.random()*2000,wy:30+Math.random()*gr*0.4,spd:15+Math.random()*20,w:60+Math.random()*80,a:0.5+Math.random()*0.4}));}
function mkRain(){rain=Array.from({length:100},()=>({x:Math.random()*w,y:Math.random()*gr,spd:400+Math.random()*200,l:10+Math.random()*10}));}
function mkSnow(){snow=Array.from({length:70},()=>({x:Math.random()*w,y:Math.random()*gr,r:1.5+Math.random()*2,spd:40+Math.random()*55,dr:(Math.random()-0.5)*18}));}

function startGame(startLvl=1){
  refreshLeaderboard();
  scene='HOSPITAL';sceneT=0;introDocX=0;
  state='WAITING';score=0;lives=3;camX=tCamX=0;elapsed=0;gtimer=0;perf=false;pressing=false;
  stick={len:0,ang:0};gone=false;floats=[];lvl=Math.max(1,Math.min(99,startLvl|0));lp=0;pc=0;deathMsg='';deathMsgT=0;burstT=0;
  skyA=TLIST[lvl%TLIST.length];skyB=skyA;skyT=1;
  plats=[{x:40,w:130,last:false}];buildLvl();ci=0;
  const p0=plats[0];pl={x:p0.x+p0.w-24,y:gr,vy:0};
  mkClouds();mkRain();mkSnow();
}

function init(){
  resize();
  playerName=localStorage.getItem('eos_name')||'';
  selectedAvatar=localStorage.getItem('eos_avatar')||'maleDoctor';
  if(selectedAvatar==='male')selectedAvatar='maleDoctor';
  if(selectedAvatar==='female')selectedAvatar='femaleDoctor';
  if(!['maleDoctor','femaleDoctor','maleNurse','femaleNurse'].includes(selectedAvatar))selectedAvatar='maleDoctor';
  nameField.value=playerName;
  updateAvatarButtons();
  showNameOverlay();
}

const scx=wx=>wx-camX;
const pivX=()=>plats[ci].x+plats[ci].w;
function endX(){return pivX()+stick.len*Math.sin(stick.ang*Math.PI/180);}
function quality(){const ex=endX(),np=plats[ci+1];if(!np||ex<np.x||ex>np.x+np.w)return'miss';return Math.abs(ex-(np.x+np.w/2))<np.w/6?'perf':'good';}
function float(txt,wx,wy,col){floats.push({txt,wx,y:wy,col,life:1.1});}
function rr(x,y,bw,bh,r){if(ctx.roundRect){ctx.roundRect(x,y,bw,bh,r);return;}r=Math.min(r,bw/2,bh/2);ctx.moveTo(x+r,y);ctx.lineTo(x+bw-r,y);ctx.quadraticCurveTo(x+bw,y,x+bw,y+r);ctx.lineTo(x+bw,y+bh-r);ctx.quadraticCurveTo(x+bw,y+bh,x+bw-r,y+bh);ctx.lineTo(x+r,y+bh);ctx.quadraticCurveTo(x,y+bh,x,y+bh-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function update(dt){
  if(!scene)return;
  if(scene==='HOSPITAL'){sceneT+=dt;return;}
  if(scene==='WALKOUT'){sceneT+=dt;introDocX+=150*dt;if(sceneT>1.8)scene='GAME';return;}
  if(scene==='HOUSEIN'){sceneT+=dt;if(sceneT>1.5){scene=lvl===10?'DUEL':'FLASH';sceneT=0;}return;}
  if(scene==='DUEL'){sceneT+=dt;if(sceneT>10){scene='FLASH';sceneT=0;}return;}
  if(scene==='FLASH'){sceneT+=dt;if(sceneT>0.8){lp=0;const nextLvl=lvl+1;if(nextLvl>=4)lives++;lvl=nextLvl;SFX.lvl();skyB=TLIST[lvl%TLIST.length];skyT=0;buildLvl();gone=false;stick.len=0;stick.ang=0;scene='GAME';state='WAITING';}return;}
  elapsed+=dt;
  skyT=Math.min(1,skyT+dt*0.4);if(skyT>=1)skyA=skyB;
  const wth=WLIST[lvl%WLIST.length];
  clouds.forEach(c=>{c.wx+=c.spd*dt;if(c.wx-camX*0.3>w+100)c.wx-=w+300;});
  if(wth==='rainy')rain.forEach(r=>{r.y+=r.spd*dt;r.x+=40*dt;if(r.y>gr){r.y=-10;r.x=Math.random()*w;}});
  if(wth==='snowy')snow.forEach(s=>{s.y+=s.spd*dt;s.x+=s.dr*dt;if(s.y>gr){s.y=-5;s.x=Math.random()*w;}});
  if(state==='GROWING'){stick.len+=gspd()*dt;gtimer+=dt;if(gtimer>0.067){SFX.grow();gtimer=0;}}
  if(state==='FALLING'){
    stick.ang+=fspd()*dt;
    if(stick.ang>=90){stick.ang=90;SFX.fall();const q=quality();if(q==='miss'){state='DEAD';}else{state='WALKING';gone=false;if(q==='perf'){perf=true;SFX.perfect();float('✨ PERFECT!',endX(),gr-60,'#f4e04d');}else SFX.land();}pl.vy=0;}
  }
  if(state==='WALKING'){
    pl.x+=wspd()*dt;
    const np=plats[ci+1];if(!np){state='WAITING';return;}
    if(pl.x>=np.x+np.w-24){
      pl.x=np.x+np.w-24;ci++;gone=true;stick.len=0;stick.ang=0;
      const wp=perf;score+=wp?2:1;perf=false;SFX.score();saveHi();
      float(wp?'+2':'+1',pl.x+12,pl.y-60,'#e9c46a');lp++;
      if(lp>=10){scene='HOUSEIN';sceneT=0;introDocX=scx(pl.x)+12;return;}
      if(lp===5){const idx=TLIST.indexOf(skyA);skyB=TLIST[(idx+1)%TLIST.length];skyT=0;}
      while(plats.length<=ci+6){const l=plats[plats.length-1];plats.push(mkPlat(l.x+l.w,false));}
      gone=false;gtimer=0;state=pressing?'GROWING':'WAITING';
    }
  }
  if(state==='WAITING'||state==='GROWING'||state==='FALLING'){
    const p=plats[ci];tCamX=Math.max(0,p.x+p.w-w*0.35);
    camX+=(tCamX-camX)*(1-Math.pow(1-0.08,dt*60));
  }
  if(state==='DEAD'){
    pl.vy+=2160*dt;pl.y+=pl.vy*dt;pl.x+=120*dt;
    if(isAdminName()&&pl.y>h+80){
        SFX.fail();saveHi();
        const ni=Math.min(ci+1,plats.length-1),p=plats[ni]||plats[ci];
        ci=ni;pl.x=p.x+p.w-24;pl.y=gr;pl.vy=0;
        camX=tCamX=Math.max(0,p.x+p.w-w*0.35);
        stick.len=0;stick.ang=0;gone=false;gtimer=0;pressing=false;state='WAITING';
        return;
    }
    if(!isAdminName()&&pl.y>=h-24){burstWX=pl.x;burstY=h-24;burstT=0;state='BURST';SFX.fail();saveHi();return;}
  }
  if(state==='BURST'){
    burstT+=dt;
    if(burstT>1.5){
      lives--;SFX.fail();saveHi();
      if(lives<=0){
        state='GAME_OVER';
        (playerName&&score>0?saveScore(playerName,score,lvl):Promise.resolve()).then(()=>getLeaderboard()).then(data=>{leaderboard=data;});
      } else {
        lp=0;const si=(lvl-1)*10;ci=Math.max(0,si);
        const p=plats[ci];pl.x=p.x+p.w-24;pl.y=gr;pl.vy=0;
        camX=tCamX=Math.max(0,p.x+p.w-w*0.35);
        stick.len=0;stick.ang=0;gone=false;
        deathMsg='';deathMsgT=0;state='WAITING';
      }
    }
  }
  floats.forEach(f=>{f.y-=55*dt;f.life-=dt;});floats=floats.filter(f=>f.life>0);
  if(deathMsgT>0)deathMsgT-=dt;
}

function drawHospital(t){
  const sky=ctx.createLinearGradient(0,0,0,gr);sky.addColorStop(0,'#87ceeb');sky.addColorStop(1,'#c8e6f5');
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,gr);
  [[w*0.62,38],[w*0.8,22],[w*0.93,48]].forEach(([cx,cy])=>{ctx.fillStyle='rgba(255,255,255,0.88)';ctx.beginPath();ctx.ellipse(cx,cy,28,13,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx-18,cy+5,18,10,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+18,cy+5,18,10,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#7a8a78';ctx.fillRect(0,gr,w,h-gr);ctx.fillStyle='#6a7a68';ctx.fillRect(0,gr,w,7);
  for(let i=0;i<w;i+=36){ctx.fillStyle='#f0c030';ctx.fillRect(i,gr+18,20,4);}
  ctx.fillStyle='#6a8a62';ctx.beginPath();ctx.arc(w*0.38,gr+36,30,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f0c030';ctx.lineWidth=2;ctx.beginPath();ctx.arc(w*0.38,gr+36,34,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,kx=w*0.38+Math.cos(a)*46,ky=gr+36+Math.sin(a)*24;ctx.fillStyle='#e63946';ctx.fillRect(kx-2,ky-9,4,10);ctx.fillStyle='#fff';ctx.fillRect(kx-2,ky-6,4,3);}
  const BX=15,BW=w*0.68,BH=gr*0.88,BY=gr-BH;
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(BX+5,BY+5,BW,BH);ctx.fillStyle='#f2f2ee';ctx.fillRect(BX,BY,BW,BH);ctx.fillStyle='#e0e0dc';ctx.fillRect(BX,BY,BW,10);
  for(let r=0;r<5;r++)for(let c=0;c<8;c++){const px=BX+18+c*((BW-36)/8),py=BY+18+r*((BH-40)/5),pw=36,ph=22;if(px+pw>BX+BW-8)continue;const lit=((r*5+c*3)%4)!==3;ctx.fillStyle=lit?'rgba(200,225,245,0.82)':'rgba(120,148,168,0.5)';ctx.fillRect(px,py,pw,ph);if(lit){ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fillRect(px,py,pw/2,ph);}ctx.strokeStyle='rgba(160,185,205,0.65)';ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);}
  const SX=BX,SW=BW*0.34,SH=BH*0.5,SY=gr-SH;
  ctx.fillStyle='#eaeae6';ctx.fillRect(SX,SY,SW,SH);ctx.fillStyle='rgba(160,200,225,0.6)';ctx.fillRect(SX+8,SY+8,SW-16,SH*0.26);
  ctx.fillStyle='#cc1122';ctx.font='bold 30px Arial';ctx.textAlign='left';ctx.fillText('ACİL',SX+16,SY+SH*0.48);ctx.fillStyle='#cc1122';ctx.font='bold 17px Arial';ctx.fillText('SERVİS',SX+16,SY+SH*0.48+24);ctx.fillStyle='#888';ctx.font='9px Arial';ctx.fillText('KOCAELİ ÜNİVERSİTESİ HASTANESİ',SX+16,SY+SH*0.48+42);
  const HCX=SX+SW-28,HCY=SY+24;ctx.fillStyle='#e63946';ctx.beginPath();ctx.arc(HCX,HCY,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaeae6';ctx.beginPath();ctx.arc(HCX+5,HCY-2,13,0,Math.PI*2);ctx.fill();
  const signX=BX+SW,signY=BY+6,signW=BW-SW-6;ctx.fillStyle='#1565c0';ctx.fillRect(signX,signY,signW,22);ctx.save();ctx.beginPath();ctx.rect(signX,signY,signW,22);ctx.clip();ctx.fillStyle='#fff';ctx.textAlign='left';let signText=w<430?'KOÜ ED':w<560?'KOÜ EMERGENCY':'🏥  KOÜ EMERGENCY DEPARTMENT',signSize=w<560?8:10;ctx.font=`bold ${signSize}px Arial`;while(ctx.measureText(signText).width>signW-14&&signSize>6){signSize--;ctx.font=`bold ${signSize}px Arial`;}ctx.fillText(signText,signX+6,BY+21);ctx.restore();

function liveRows(){

  leaderboard.forEach(r=>{if(!r||!r.name)return;const old=byName.get(r.name),rs=Number(r.score)||0;if(!old||rs>old.score)byName.set(r.name,{name:r.name,score:rs,level:Number(r.level)||1});});

  return [...byName.values()].sort((a,b)=>b.score-a.score||b.level-a.level||a.name.localeCompare(b.name));
}

  if(px<150||state==='GAME_OVER')return;
  if(activePlayerCount!==null){ctx.fillStyle='rgba(8,10,20,0.55)';ctx.beginPath();rr(px,py-26,compact?72:82,20,10);ctx.fill();ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(px+12,py-16,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold ${compact?10:11}px Arial`;ctx.textAlign='left';ctx.fillText(String(activePlayerCount),px+23,py-12);}
  ctx.fillStyle='rgba(10,8,25,0.68)';ctx.beginPath();rr(px,py,pw,ph,10);ctx.fill();ctx.strokeStyle='rgba(233,196,106,0.35)';ctx.lineWidth=1;ctx.beginPath();rr(px,py,pw,ph,10);ctx.stroke();
  ctx.fillStyle='#e9c46a';ctx.font=`bold ${compact?10:11}px Arial`;ctx.textAlign='left';ctx.fillText('TOP 5',px+10,py+18);
  if(top.length===0){ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font=`${compact?10:11}px Arial`;ctx.fillText('No scores yet',px+10,py+42);return;}
  top.forEach((r,i)=>{const y=py+38+i*rowH,isMe=r.name===playerName;ctx.fillStyle=isMe?'rgba(74,222,128,0.18)':'rgba(255,255,255,0.05)';ctx.beginPath();rr(px+6,y-rowH+3,pw-12,rowH,5);ctx.fill();ctx.fillStyle=isMe?'#4ade80':'#fff';ctx.font=`${isMe?'bold ':''}${compact?10:11}px Arial`;ctx.textAlign='left';ctx.fillText(`${i+1}. ${shortName(r.name,compact?9:12)}`,px+10,y);ctx.textAlign='right';ctx.fillStyle='#e9c46a';ctx.font=`bold ${compact?10:11}px Arial`;ctx.fillText(String(r.score),px+pw-10,y);});
  if(rank>5){const y=py+38+5*rowH+12;ctx.strokeStyle='rgba(255,255,255,0.16)';ctx.beginPath();ctx.moveTo(px+10,y-11);ctx.lineTo(px+pw-10,y-11);ctx.stroke();ctx.fillStyle='#4ade80';ctx.font=`bold ${compact?10:11}px Arial`;ctx.textAlign='left';ctx.fillText(`#${rank} ${shortName(playerName,compact?8:11)}`,px+10,y);ctx.textAlign='right';ctx.fillText(String(score),px+pw-10,y);}
}

function drawBurst(){
  const x=scx(burstWX),y=burstY,t=Math.min(1,burstT/1.5);
  ctx.save();ctx.globalAlpha=1-t*0.15;
  for(let i=0;i<24;i++){const a=i*2.399,spd=18+(i%7)*8,px=x+Math.cos(a)*spd*t,py=y+Math.sin(a)*spd*t-18*t,sz=2+(i%4);ctx.fillStyle=i%3?'#d91f3c':'#7f1022';ctx.beginPath();ctx.arc(px,py,sz*(1-t*0.35),0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='#111827';ctx.lineWidth=4;ctx.lineCap='round';
  for(let i=0;i<6;i++){const a=i*Math.PI/3+0.4,px=x+Math.cos(a)*32*t,py=y-18+Math.sin(a)*22*t;ctx.beginPath();ctx.moveTo(px-4,py-4);ctx.lineTo(px+5,py+5);ctx.stroke();}
  ctx.restore();
}

function drawDeathMsg(){
  if(deathMsgT<=0||!deathMsg)return;
  const alpha=deathMsgT>2?Math.min(1,(2.5-deathMsgT)*4):Math.min(1,deathMsgT*2);
  const slideX=deathMsgT>2?(1-(2.5-deathMsgT)*4)*(-w*0.4):0;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(slideX,0);
  const lines=deathMsg.split('\n'),bw=320,bh=lines.length*28+32,bx=w/2-bw/2,by=h*0.3;
  ctx.fillStyle='rgba(20,10,40,0.88)';ctx.beginPath();rr(bx,by,bw,bh,14);ctx.fill();ctx.strokeStyle='#e9c46a';ctx.lineWidth=2;ctx.beginPath();rr(bx,by,bw,bh,14);ctx.stroke();
  ctx.font='26px Arial';ctx.textAlign='center';ctx.fillText('😩',w/2,by+28);ctx.fillStyle='#fff';ctx.font='bold 15px Arial';lines.forEach((line,i)=>ctx.fillText(line,w/2,by+52+i*26));
  ctx.restore();
}

function drawLeaderboard(){
  if(!showLeaderboard)return;
  ctx.fillStyle='rgba(10,8,25,0.96)';ctx.fillRect(0,0,w,h);ctx.fillStyle='#e9c46a';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText('🏆 LEADERBOARD',w/2,50);
  if(leaderboard.length===0){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='15px Arial';ctx.fillText('No scores yet. Be the first!',w/2,h/2);}
  else{leaderboard.forEach((row,i)=>{const y=90+i*38,isMe=row.name===playerName;ctx.fillStyle=isMe?'rgba(74,222,128,0.15)':'rgba(255,255,255,0.04)';ctx.beginPath();rr(w/2-160,y-22,320,32,8);ctx.fill();if(isMe){ctx.strokeStyle='#4ade80';ctx.lineWidth=1;ctx.beginPath();rr(w/2-160,y-22,320,32,8);ctx.stroke();}const medal=['🥇','🥈','🥉'][i]||(i+1)+'.';ctx.fillStyle=isMe?'#4ade80':'#fff';ctx.font=`${isMe?'bold ':''}15px Arial`;ctx.textAlign='left';ctx.fillText(`${medal}  ${row.name}`,w/2-150,y);ctx.textAlign='right';ctx.fillStyle='#e9c46a';ctx.font='bold 15px Arial';ctx.fillText(`⭐${row.score}  Lv${row.level}`,w/2+150,y);});}
  const bw=140,bh=36,bx=w/2-bw/2,by=h-60;ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();rr(bx,by,bw,bh,10);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();rr(bx,by,bw,bh,10);ctx.stroke();ctx.fillStyle='#fff';ctx.font='14px Arial';ctx.textAlign='center';ctx.fillText('✕ Close',w/2,by+bh/2+5);
}

function drawHint(){if(state!=='WAITING'||score>0)return;ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='14px Arial';ctx.textAlign='center';ctx.fillText('Hold to grow bridge  ·  Release to drop',w/2,h-18);}

function drawGO(){
  if(state!=='GAME_OVER')return;
  ctx.fillStyle='rgba(10,8,25,0.82)';ctx.fillRect(0,0,w,h);
  const pw=300,ph=260,ox=w/2-pw/2,oy=h/2-ph/2;
  ctx.fillStyle='rgba(25,20,55,0.96)';ctx.strokeStyle='#e9c46a';ctx.lineWidth=2;ctx.beginPath();rr(ox,oy,pw,ph,20);ctx.fill();ctx.stroke();
  ctx.textAlign='center';ctx.font='34px Arial';ctx.fillStyle='#e63946';ctx.fillText('Game Over! 😵',w/2,oy+52);
  ctx.font='bold 20px Arial';ctx.fillStyle='#4ade80';ctx.fillText(`Level: ${lvl}`,w/2,oy+84);ctx.font='bold 22px Arial';ctx.fillStyle='#e9c46a';ctx.fillText(`Score: ${score}`,w/2,oy+112);
  if(score>=hi&&score>0){ctx.font='bold 14px Arial';ctx.fillStyle='#4ade80';ctx.fillText('🏆 New record!',w/2,oy+136);}
  ctx.font='16px Arial';ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillText('Tap to play again',w/2,oy+165);
  ctx.fillStyle='rgba(233,196,106,0.15)';ctx.beginPath();rr(w/2-80,oy+178,160,36,10);ctx.fill();ctx.strokeStyle='#e9c46a';ctx.lineWidth=1;ctx.beginPath();rr(w/2-80,oy+178,160,36,10);ctx.stroke();ctx.fillStyle='#e9c46a';ctx.font='13px Arial';ctx.fillText('🏆 Leaderboard',w/2,oy+200);
  ctx.font='36px Arial';ctx.fillText('👨‍⚕️',w/2,oy+246);
}

function draw(){
  ctx.clearRect(0,0,w,h);
  if(showLeaderboard){drawLeaderboard();return;}
  if(!scene){return;}
  if(scene==='HOSPITAL'){drawHospital(sceneT);return;}
  if(scene==='WALKOUT'){drawWalkout(sceneT);return;}
  if(scene==='HOUSEIN'){drawHouseIn(sceneT);return;}
  if(scene==='DUEL'){drawDuel(sceneT);return;}
  if(scene==='FLASH'){drawFlash(sceneT);return;}
  drawBg();drawPlats();drawStick();
  if(state==='BURST')drawBurst();
  else drawDoc(scx(pl.x)+(state==='WAITING'||state==='GROWING'?-8:12),state==='DEAD'?pl.y:gr,state==='WALKING',state==='DEAD');
  drawFloats();drawHUD();drawHint();drawGO();
}

pressing=false;
function onS(e){
  if(e&&e.preventDefault)e.preventDefault();
  const mx=e.touches?e.touches[0].clientX:e.clientX;
  const my=e.touches?e.touches[0].clientY:e.clientY;
  const cr=canvas.getBoundingClientRect();
  const cx2=(mx-cr.left)*(w/cr.width);
  const cy2=(my-cr.top)*(h/cr.height);
  if(showLeaderboard){
    const bw=140,bh=36,bx=w/2-bw/2,by=h-60;
    if(cx2>bx&&cx2<bx+bw&&cy2>by&&cy2<by+bh){showLeaderboard=false;if(!scene)showNameOverlay();}
    return;
  }
  if(scene==='HOSPITAL'&&cx2>w-50&&cx2<w-14&&cy2>54&&cy2<84){backToMenu();return;}
  if(scene==='HOSPITAL'&&isAdminName()){const px=w-154,py=gr*0.54;if(cx2>px+12&&cx2<px+42&&cy2>py+30&&cy2<py+60){adminStartLevel=Math.max(1,adminStartLevel-1);return;}if(cx2>px+92&&cx2<px+122&&cy2>py+30&&cy2<py+60){adminStartLevel=Math.min(99,adminStartLevel+1);return;}}
  const reX=w<520?90:108;if(scene==='GAME'&&state!=='GAME_OVER'&&cx2>reX&&cx2<reX+30&&cy2>14&&cy2<44){startGame(adminStartLevel);return;}
  if(scene==='HOSPITAL'){if(isAdminName()&&lvl!==adminStartLevel)startGame(adminStartLevel);scene='WALKOUT';sceneT=0;introDocX=80;return;}
  if(scene==='WALKOUT'||scene==='HOUSEIN'||scene==='DUEL'||scene==='FLASH')return;
  if(state==='GAME_OVER'){
    const oy=h/2-130;
    if(cx2>w/2-80&&cx2<w/2+80&&cy2>oy+178&&cy2<oy+214){getLeaderboard().then(data=>{leaderboard=data;showLeaderboard=true;});return;}
    startGame();return;
  }
  if(state==='BURST')return;
  if(state==='WAITING'&&!pressing){pressing=true;state='GROWING';}else pressing=true;
}
function onE(e){if(e&&e.preventDefault)e.preventDefault();pressing=false;if(state==='GROWING'){gtimer=0;state='FALLING';}}
canvas.addEventListener('mousedown',onS);canvas.addEventListener('mouseup',onE);
canvas.addEventListener('touchstart',onS,{passive:false});canvas.addEventListener('touchend',onE,{passive:false});
const kd=new Set();
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();if(!kd.has(e.code)){kd.add(e.code);onS(e);}}});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowRight'){kd.delete(e.code);onE(e);}});
window.addEventListener('resize',()=>{resize();mkClouds();});

init();
let LT=null;
function loop(ts){if(!LT){LT=ts;requestAnimationFrame(loop);return;}const dt=Math.min((ts-LT)/1000,0.1);LT=ts;update(dt);draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
